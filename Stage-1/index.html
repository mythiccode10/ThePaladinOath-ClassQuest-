<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Paladin's Seal - Initiate's Trial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header class="game-header">
            <h1>The Paladin's Seal</h1>
            <p id="status-text">Prove your worth, Initiate.</p>
        </header>

        <div class="seal-container" id="game-interface">
          <div class="shield-frame">
    <div class="rune-tile justice" data-virtue="0" title="Justice">
        <i class="fa-solid fa-gavel"></i>
    </div>
    
    <div class="rune-tile valor" data-virtue="1" title="Valor">
        <i class="fa-solid fa-shield-halved"></i>
    </div>
    
    <div class="rune-tile compassion" data-virtue="2" title="Compassion">
        <i class="fa-solid fa-hand-holding-heart"></i>
    </div>
    
    <div class="rune-tile truth" data-virtue="3" title="Truth">
        <i class="fa-solid fa-eye"></i>
    </div>

    <div class="center-gem" id="start-btn">
        <span>ACTIVATE</span>
    </div>
</div>
        </div>

        <footer class="game-footer">
            <div class="favor-counter">Divine Favor: <span id="score">0</span></div>
            <div class="aegis-marker">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Aegis of Protection</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
